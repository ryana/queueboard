image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim

variables:
  UV_LINK_MODE: copy
  UV_CACHE_DIR: .uv-cache

cache:
  paths:
    - .uv-cache

stages:
  - validate

validate:
  stage: validate
  script:
    - uv sync --frozen
    - uv run ruff check .
    - uv run ruff format --check .
    - uv run mypy
    - uv run pytest
